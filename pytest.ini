[pytest]
# Pytest configuration for sentiment-bert integration tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Verbosity and output
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra

# Markers for test categories
markers =
    integration: Integration tests that verify component interactions
    unit: Unit tests for individual functions
    slow: Tests that take longer to run
    e2e: End-to-end pipeline tests
    data: Data pipeline tests
    training: Training loop tests
    inference: Model inference tests

# Minimum Python version
minversion = 3.8

# Test timeout (seconds)
timeout = 300
timeout_method = thread

# Ignore warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
